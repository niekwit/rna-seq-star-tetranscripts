genome: mm39
ensembl_genome_build: 113
strand: reverse # check https://pypi.org/project/TEtranscripts/

fdr_cutoff: 0.05 # cut off for volcano plots
fc_cutoff: 0.5 # log2 fold change cut off for volcano plots

spike_in:
  apply: False # whether to apply spike-in correction
  name: ERCC- # pattern for spike-in names
  gtf: /path/to/ERCC.gtf
  fasta: /path/to/ERCC.fasta

mapping: # STAR mapping parameters
  outFilterMultimapNmax: 100
  winAnchorMultimapNmax: 100
  extra_params: "" # additional arguments to pass to STAR

# Split bam files by chromosome for parallel processing of each sample
# This is recommended for running large datasets on a cluster
split_bam: False

deeptools:
  binsize: 50
  normalisation: RPKM

# Integration with NGS Tracker for workflow registration and file attachment
# https://github.com/niekwit/ngs-tracker
ngs_tracker:
  enabled: false # set to true to enable registration

  # Connection
  base_url: "http://127.0.0.1:5000/api" # change host/port if needed

  # Run identity  (find project_id on the project detail page)
  project_id: 3
  #run_id: 1 # optional, if not provided a new run will be created
  workflow_name: "rna-seq-star-tetranscripts"
  workflow_tag: "v0.6.0"
  workflow_system: "snakemake" # snakemake | nextflow | cwl | other
  description: "TE RNA-seq"
  tags:
    - Test

  # Files to attach — paths relative to the working directory or absolute
  # type: config | sample_info | qc | results | mapping_rates | other
  files:
    - path: "config/config.yaml"
      type: config
      description: "Workflow config"
    - path: "results/qc/multiqc/multiqc.html"
      type: qc
      description: "MultiQC report"
    - path: "results/plots/mapping_rates.csv"
      type: mapping_rates
    - path: "results/plots/*.pdf"
      type: qc
    - path: logs/snakemake/*.log
      type: snakemake_log
    - path: "results/plots/te_classes/*.pdf"
      type: results
      description: "TE class plots"
    - path: "results/plots/volcano/*.pdf"
      type: results
      description: "Volcano plots"
